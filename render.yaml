services:
  - type: web
    name: keruen-backend
    env: docker
    plan: starter
    dockerfilePath: backend/Dockerfile
    region: oregon
    envVars:
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: SECRET_KEY
        value: ${SECRET_KEY}
      - key: CORS_ORIGINS
        value: ${CORS_ORIGINS}
      - key: AUTH_MODE
        value: ${AUTH_MODE}
      - key: DEMO_MODE
        value: ${DEMO_MODE}
      - key: SEED_ON_STARTUP
        value: ${SEED_ON_STARTUP}
      - key: GEMINI_API_KEY
        value: ${GEMINI_API_KEY}
    autoDeploy: true

  - type: web
    name: keruen-frontend
    env: docker
    plan: starter
    dockerfilePath: frontend/Dockerfile
    region: oregon
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: ${NEXT_PUBLIC_API_URL}
      - key: NEXT_PUBLIC_WS_URL
        value: ${NEXT_PUBLIC_WS_URL}
    autoDeploy: true
